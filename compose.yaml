services:
  downly:
    build:
      context: .
      dockerfile: Dockerfile
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./downloads:/app/downloads
      - ./tmp:/app/tmp
      - ./cookies:/app/cookies
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-config", "/app/config.yaml"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: downly
      POSTGRES_PASSWORD: downly
      POSTGRES_DB: downly
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U downly -d downly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes: {}
